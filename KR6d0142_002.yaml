body:
  text: 清天溪和尚説門人靈耀補定大章七正修二一標示第二釋明三一解行相資意二一舉相資法喻膏二出相資修法行二依解立行相二一自行成相此二為人説相二一正明二一明得機説益二一説相而二益相香二誡非機莫説二一出非機三一癡鈍凡惡其二厭世劣乘設三一種禪人又二誡莫説不二結示夫三正説止觀法二一定止觀十境四一開章門開二敘次第陰十章三明觀發四一示十皆能障此二明陰境恆觀陰三明八二速近又八四明諸境互發三一總示又若二別明三一列章互二釋明次十章三料簡問三結誡此四私料簡四一簡數方私二簡通別三一十境通別四句四一通二一境法俱通問二行人俱通二一正簡問二重簡三一通是無常問二通是有漏問三通是偏真問二別問三亦通亦別復四非通非別非二陰解非條然別問三十境自條然別問三簡境觀三一陰即是觀問二轉陰為觀問三五分判境問四簡具界三一念具十界問二具界因果問三具界法爾問二正十乘觀境二正十乘觀境十一觀陰入境三一釋所觀境三一標列第二釋明二一通釋三科二一釋名陰二開合毗二正釋五陰三一明心王前後二二兩論義數二今判明若二出陰從心造二一出五陰多種又二明源從心出二一標如二釋二一心造六界正二心造十界若三斥凡小不知三一況斥凡小世二引經示邪故三以論結斥故三揀示二一結心為惑本然二示的觀陰心若二明能觀觀三一開章觀二示意二一示觀法精妙三一法示既二譬明譬三合顯此二出正由法華蓋三正釋二一於坐儀觀陰入二一法明十乘十一觀不思議境三一標起一二釋明二一思議境二一小乘生法思二大乘生法三一標心生十界大二釋十法界法若三結非今所觀此二不思議境二一正明初乘觀境三一法示二一一念百界千如三一明十界十如三一一念十法界二一引示不二釋明種二十界三世間二一釋三一五陰世間十二衆生世間攬三國土世間十二結此三三世間十如三一五陰十如二一標示又二釋明二一列先二釋二一總釋十章二類釋三一標二二釋四一三惡二三善三二乘四菩佛三簡二一因緣逆順因二報法有無若二衆生十如三國土十如二出三千具念三一正出夫二例明例三結合今三結妙境在此故二觀心即空假中二譬顯三合明若信二結示九乘依境此三結示説二發菩提心三巧安止觀四破法遍五識通塞六修道品七對治助開八知位次九能安忍十離法愛二譬以大車二於餘儀觀陰入三結示觀用二觀煩惱境三觀病患境四觀業境五觀魔境六觀禪境七觀見境八觀慢境九觀二乘境餘十觀菩薩境二觀心即空假中二一徵起問二釋明三一觀心三千即空妙境三一出二論權計二一正出答二斷明若從二檢心法即空四一約橫四句生求不可得二一四句求心生不可得三一法檢二一據計核破若法二責違經論又二譬推三一定計更二推破若依三結明四三合明心二四句求三千不可得當二約縱於滅等求不可得既三約雙亦求不可得亦四納雙非求不可得非三結觀心妙境言二觀心三千即假妙境二一正示不可説可説以開假門二一正説假門二一明四不可説大二明四俱可説二一示假説意三一止示當二引明如三結示雖二出假説法四一世界四句説或二為人四句説云三對治四句説云四第一義四句説云二結示説意三一示説意佛二責人師經三結得意若得二復出隨便宜法説以結妙境若隨三觀心三千即中妙境三觀心即中三千妙境三一別顯圓中法門六一三法妙境若解二三諦妙境若法三三觀妙境若一四三智妙境若因五三語妙境若隨六三趣妙境若解二總出名異義同此三結示一切圓成得二譬顯三一意珠喻如二惑心喻又三三眠夢喻又如二發菩提心三一牒章二二釋相三一明慈悲願境二一依境起悲願三一立誓境既二明誓由二一於五道思惟彼我自二於二乘思惟彼我假三正發誓三一正發即二釋明衆三結正今二依境起慈願三一立誓境又二明誓由我三正發誓三一正發今二釋明雖三結正是二出願境同時如三結真正發心不三指説自三巧安止觀三一示意三二釋明二一出所安法性無二明能安止觀二一總安心二一止觀各安二一以止安今二以觀安觀二止觀俱安止二別安心二一徵起若二答釋二一示意夫二正安二一初列安二釋二一論師教根性二一能教道師三一標列教二釋明二一聖師聖二凡師二三結示身二所教根性二一列他二釋二一二論明二一正明薩二分解若二今師明二一正明根性今二根性利鈍若二隨根性以安二一徵巳二釋二一示審定根性師二正止觀安心二一總標既二別釋二一一向根性二一示法二一教他二一正明二一定根二一信行八番安心二一正明二一以止安心四一隨樂止安咄二為人止安又三對治止安又四第一義止安又二以觀安心二一結前起後二正明四一隨樂觀安即二為人觀安又三對治觀安又四第一義觀安又二結示如二法行八番安心二一正明二一止悉安心四一歡喜其二生善其三破惡若四悟理其二觀悉安心四一歡喜彼二生善若三破惡觀四悟理觀二結示是二轉根二一斥始終利鈍復二明一時利鈍三一示意今二正明若三結示得二結數自二相資根性三結示二自行二一總示自二別明二一定根安心二一法行八番二一正明四一止觀隨樂樂二止觀便宜其三止觀破惡若四止觀悟理修二結示是二信行八番二一正明四一止觀隨樂信二止觀便宜聽三止觀破惡或四止觀悟理或二結示是二轉根安心若二相資根性三一標復二釋二一資聞法行八番二一正示二一明止二四觀二結明此二資思信行八番二一正示結二結