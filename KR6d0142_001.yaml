body:
  text: 清天溪和尚說門人靈耀補定一總題摩二別文二一緣起二一說二一標舉所聞三一未聞止二正聞智三不盡雖二述明宗本二一徵討宗元然二正述宗本二一標行二釋二一付藏宗傳二一敘付法緣二一佛傳迦葉大二諸祖遞承二一正敘迦二結數付二出付法益三一標益多諸二引事明昔三結付意佛二今家宗傳二一檢宗承四一章安所承三一所說法門此二現世化道智三證入品位位二智者所承智三南岳所承南四北齊所承二一正敘文二簡明疑二述傳觀三一正述傳觀三一舉示天二列名一三釋相二一略說三一出旨皆二明相漸三結意為二廣說三一漸次觀相三一結上標起略二釋明觀相先三結成止觀是二不定觀相二一觀相三一不定法不二不定觀或事三不定名或息二辨差二一不定與漸次辨二二二觀與圓頓辨二一問疑此二答然然三圓頓觀相三一正示圖二詳明三一詳初緣句繫二詳造境句一色三詳無不句無苦三結顯法二引證勸信三示知文意二結已二正說二引證勸信二一引證二一正證圓觀三一揀示漸二正明二一如來分別為說三一引經如二釋明二一開章此二隨釋六一聞圓法三一標云二釋二一聞一念圓常聞二例諸法皆具聞三結是二起圓信云三立圓行云四佳圓位云五圓自在莊嚴二一徵起云二釋相三一法明三一標彼二釋或三結是二譬解三合顯菩六圓建立眾生三一標云二釋三一法或二譬故三合菩三結是三結況初二聞者恩大難酬如三例餘一經二重證三種二一請疑二證二一示引略然二正引文二一一經具證三觀四一淨明三義二大品三義三法華三義四涅槃三義二一經單證一觀三一無量義證漸無二六種經證圓華三華嚴證不定華二勸信二勸信三一舉示能證上二出指所證過三結明定信如三示知文意三一標指既二示明二一正出三文次二示三文意二一示說文意雖二問答說意一以默難說疑二責徧示正二一責偏然二示正二一對默示說四一教法通別皆可說大二諦理真俗皆可說大三行事說默皆是道淨四示人人法皆能示法二明說示人三一原說教意若二明示文意大三出三文旨若三結成為二正說五一開章二一標列合二出意十二生起三一示意生二釋義二一通論至二別論二一釋名別二明相所三結成秪三分別二一示意分二正分二一徵列今二答釋初四料簡四一簡今是一頓問二簡皆是顯觀二一正簡觀顯不觀秘問二任論有得有不得二一問二答二一立答二釋二一明教得不得教二明觀得不得若三簡皆是大乘二一簡初後二深問二簡初後俱淺二一簡小非三觀問二簡小非是漸問四簡文門並實二一問二答二一直示答二轉明二一文是其門眾二文門並實文五解釋五解釋二一牒示解二正釋十一大意二一牒章初二釋明三一示意標門蠧二生起因緣二一正明云二對廣生三隨章解釋五一發大心三一標章就二釋明三一方言菩二簡非二一簡非心二一標示今二釋明三一列心道非相三一舉數略二列相若其三結示三一結略數若心二明開合或三示舉端舉二出濁心起相三一法或先二譬三合集三簡起心濁相二一約苦諦升沉世間簡二二約苦諦二雙法簡又二舉集等六雙法例有二約諦智曲拙灰近簡又二發是心二一止非觀是二一正明若二結位初二感應發心二一問二答二一正出感應道交發心三一正示答二釋明如三結顯動二示明經論此觀感應二一示感應意二一正示隨悉五復二一禪經四隨禪二智論悉復二一四悉智二五復更二隨出五緣與同二一舉示此二釋明三一示意若二引釋論三結成故二會意義同二一標示然二會同二一會五緣同經論二一正會同二一五緣與隨悉意義同二一意同二一會通四二結示當二義同二一出經論隨二正會通又二五緣與五復意義同二一會通又二結示所二明成顯二一出感應又二明相成二一略出或二結廣如三結觀名還二會十廣同五略又三顯是三結示二修大行三感大果四裂大網五歸大處二釋名三體相四攝法五偏圓六方便七正觀八果報如上九起教如上十旨歸如上三顯是二一標列顯二釋明三一約四諦顯是二一分四種四諦二一標列四二釋明二一大經總別說二一總說名四四諦二一明四四諦四一生滅四諦二無生四諦三無量四諦四一苦無量相無二集無量相又集三道無量相又道四滅無量相又滅四無作四諦二以諦對土若以二別說名四因緣一舉總標別又總二別說因緣苦三引明四種故二中論總別說二一正明二一總說四四諦二一正示又偈二重解又解二別說四因緣二一會前後法又偈二指前後文故二結示二明依諦發心二約四弘顯是三約六即顯是二明依諦發心二一指上四四諦竟已二正明依諦發心二一列章二一正列諸二指廣略二解釋二一正釋發相二一詳釋四章四一推理發心三一總標推二別釋四一推生滅理發心法二推無生理發心推三推無量理發心四推無作理發心三示意二一正示若二例下下二觀相發心二一標牒觀云二釋明四一觀劣應相好發心若見二觀勝應相好發心三觀報佛相好發心四觀法佛相好發心三見通發心二一標牒觀云二釋明四一見劣應神變發心若見二見勝應神變發心三見報佛神變發心四見法佛神變發心四聞法發心二一標云二釋三一明聞法所從或從二出聞法起解二一聞一眾解二一從教四聞四一聞生滅四解聞二聞無生四解若聞三聞無量四解四聞無作四解二得意一聞若得二約偈重說二一標示夫二正說四一生滅四解是緣生意若言二無生四解是即空意若因三無量四解是即假意若謂四無作四解是即中意若謂三結聞法發心當二略指餘六此二以觀結