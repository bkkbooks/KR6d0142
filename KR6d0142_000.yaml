body:
  text: 摩訶止觀貫義科序荊溪注解三部均提大義而於輔行事實尤為詳晰但湛師著述之時多講説之日少故於科章殊遜劼毖聯貫之妙後人謬稱荊溪三部必要謹遵以念注解為講經讀科頭為家法甚至猜科為注扯注為科牽合訛蔓祖意翻晦昔天溪老人唯提大師義意立科講授文旨昭明如日出地彼時豫有私記未敢成書所以冀天溪定科出耳不圖老人即世片言隻字俱付丙丁哲人既逝斯文恐湮因於講次綴輯前聞參以管見移易增損成止觀科上下卷詒贈後賢尚亦小補名貫義者惟使止觀義理聯貫昭明不致埋沒於注解家葛藤腳下去耳或曰然則是科特為智者功臣歟答豫若講貫佛經時亦單提契經義理示人不能步趨智者注解纍纍敘科於前屑屑念注於後為弘經也敢謂佛祖功臣庶非埋沒佛祖宗旨於後人腳跟下之罪人云耳壬戌秋日嗣興天台教觀第五世比丘靈耀序於楞嚴講寺之大樹方丈
